</head>
<body class="app-mode-simulator">
  <div id="app"></div>
  <script>
    (function bootstrapSimulator() {
      const app = document.getElementById("app");
      const assetVersion = "dacs-20260429b";
      const localUrl = `http://127.0.0.1:8090/LABORATORIO%20MEGAZZONIA%20estructura%20blog/android/app/src/main/assets/simulator.html?v=${assetVersion}#inbox`;

      if (window.location.protocol === "file:") {
        document.body.style.overflow = "auto";
        app.innerHTML = `
          <main style="min-height:100vh;display:grid;place-items:center;padding:24px;">
            <section style="max-width:680px;border:1px solid rgba(24,31,35,.22);background:#fff;padding:24px;font-family:Tahoma,'Segoe UI',sans-serif;color:#172024;">
              <div style="font-size:.76rem;letter-spacing:.12em;text-transform:uppercase;color:#52616b;margin-bottom:8px;">Apertura local</div>
              <h1 style="margin:0 0 10px;font-size:2rem;">El simulador necesita HTTP</h1>
              <p style="margin:0 0 14px;color:#52616b;line-height:1.5;">El navegador bloquea los modulos JavaScript cuando este archivo se abre como file://. Ejecuta abrir-laboratorio.bat o levanta el servidor con cmd /c npm.cmd run dev.</p>
              <a style="display:inline-flex;padding:10px 12px;border:1px solid rgba(24,31,35,.2);background:#2f6f62;color:#fff;text-decoration:none;font-weight:700;" href="${localUrl}">Abrir simulador por HTTP</a>
            </section>
          </main>
        `;
        return;
      }

      function loadScript(src, type) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          if (type) {
            script.type = type;
          }
          script.onload = resolve;
          script.onerror = reject;
          document.body.appendChild(script);
        });
      }

      loadScript(`./libs/sql-wasm.js?v=${assetVersion}`)
        .then(() => loadScript(`./libs/chart.umd.js?v=${assetVersion}`))
        .then(() => loadScript(`./js/main.js?v=${assetVersion}`, "module"))
        .catch((error) => {
          app.innerHTML = `<main style="padding:24px;font-family:Tahoma,'Segoe UI',sans-serif;"><h1>No se pudo iniciar el simulador</h1><p>${String(error)}</p></main>`;
        });
    })();
  </script>
</body>
</html>
